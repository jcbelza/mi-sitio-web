<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validación de datos · CIER</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:Arial,Helvetica,sans-serif;
    background:#4169E1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:24px;
  }
  .logo{
    color:#fff;
    font-size:18px;
    font-weight:bold;
    letter-spacing:.3px;
    text-align:center;
    padding:0 20px;
    line-height:1.4;
  }
  .logo span{
    display:block;
    font-size:13px;
    font-weight:normal;
    opacity:.8;
    margin-top:6px;
  }
  .spinner{
    width:52px;height:52px;
    border:5px solid rgba(255,255,255,.25);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .msg{
    color:rgba(255,255,255,.75);
    font-size:13.5px;
    text-align:center;
  }
</style>
</head>
<body>

<div class="logo">
  Comisión de Integración Energética Regional
  <span>Validación de datos de contacto</span>
</div>

<div class="spinner"></div>

<div class="msg">Preparando su formulario…</div>

<script>
  // Toma el token de la URL de esta página y redirige a GAS
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbywMecVL0qYRw4YjXwW-5PtYbqKjww3ebk2J2c-gnPV4KLCnmD_HnC5bUht4lHOd-IV/exec';

  var params = new URLSearchParams(window.location.search);
  var token  = params.get('token');

  if(token){
    setTimeout(function(){
      window.location.href = GAS_URL + '?token=' + encodeURIComponent(token);
    }, 800);
  } else {
    document.querySelector('.msg').textContent = 'Enlace no válido. Verifique el correo recibido.';
    document.querySelector('.spinner').style.display = 'none';
  }
</script>
</body>
</html>
